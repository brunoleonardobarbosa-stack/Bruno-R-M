services:
  # 1. Serviço do Backend (FastAPI)
  - type: web
    name: neurolink-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: neurolink-db
          property: connectionString

  # 2. Serviço do Frontend (Streamlit)
  - type: web
    name: neurolink-clinica
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        fromRoute:
          type: web
          name: neurolink-api
          property: url

databases:
  - name: neurolink-db
    plan: free
